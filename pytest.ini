[pytest]
# pytest-homeassistant-custom-component requires async mode "auto" so that
# plain `async def test_*` / async fixtures (e.g. enable_custom_integrations)
# run without a per-test @pytest.mark.asyncio. Without this the whole suite
# errors at fixture setup.
asyncio_mode = auto
# Pin the async-fixture loop scope to silence the pytest-asyncio deprecation
# warning and lock in today's default behavior.
asyncio_default_fixture_loop_scope = function
testpaths = tests
# Put the repo root on sys.path so `import custom_components.price_watch`
# resolves under a bare `pytest tests/` invocation (CI). Without this it only
# works via `python -m pytest`, which implicitly adds the CWD.
pythonpath = .
