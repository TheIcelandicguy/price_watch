refresh_now:
  name: Refresh now
  description: >
    Force an immediate price check. With no target specified, refreshes all
    tracked products.
  fields:
    entry_id:
      name: Config entry ID
      description: Refresh only this product (optional).
      example: a1b2c3d4e5f6
      selector:
        text:
    device_id:
      name: Device
      description: Refresh only this product, by HA device.
      selector:
        device:
          integration: price_watch

set_target:
  name: Set target price
  description: Update the target price for a tracked product.
  fields:
    entry_id:
      name: Config entry ID
      selector:
        text:
    device_id:
      name: Device
      selector:
        device:
          integration: price_watch
    target_price:
      name: Target price
      description: Target price (in product's currency). Leave empty to clear.
      example: 4500
      selector:
        number:
          mode: box
          min: 0
          step: 0.01

set_variant:
  name: Set tracked variant
  description: >
    Pin the product-variant whose price this product follows, for sites
    that embed every variant's price in the page (Wix stores like
    athom.tech). Give the option labels exactly as shown on the page,
    e.g. "1xIR Remote, 5-48V" (comma-separated) or a YAML list. Empty
    value reverts to the page's default offer. This is the product-level
    counterpart to edit_listing's variant_options — use it for products
    created from search / panel-track that have no materialized listing.
  fields:
    entry_id:
      name: Config entry ID
      description: Target only this product (optional).
      example: 01KT04D13E97KZDX07NPNR2WSB
      selector:
        text:
    device_id:
      name: Device
      description: Target only this product, by HA device.
      selector:
        device:
          integration: price_watch
    variant_options:
      name: Variant options
      description: >
        Option labels to pin (comma-separated or YAML list). Empty
        reverts to the default offer.
      example: 1xIR Remote, 5-48V
      selector:
        text:

reset_history:
  name: Reset history
  description: Wipe the price history and lifetime extremes for a tracked product.
  fields:
    entry_id:
      name: Config entry ID
      selector:
        text:
    device_id:
      name: Device
      selector:
        device:
          integration: price_watch

set_paused:
  name: Pause / resume
  description: >
    Pause or resume price polling for a tracked product. Paused products
    keep their last-known price and stop checking until resumed.
  fields:
    entry_id:
      name: Config entry ID
      description: Target only this product (optional).
      selector:
        text:
    device_id:
      name: Device
      description: Target only this product, by HA device.
      selector:
        device:
          integration: price_watch
    paused:
      name: Paused
      description: True to pause polling, false to resume.
      default: true
      selector:
        boolean:

find_alternatives:
  name: Find alternatives
  description: >
    Search the web for alternative retailer listings of a tracked product.
    Uses Anthropic's native web search when the product is configured with
    an Anthropic AI provider; otherwise falls back to DuckDuckGo + AI
    synthesis (works with Ollama / OpenAI-compatible providers).
  fields:
    entry_id:
      name: Config entry ID
      description: Search only for this product (optional).
      example: 01KQK9NAANSEH2D4V10MFY3P72
      selector:
        text:
    device_id:
      name: Device
      description: Search only for this product, by HA device.
      selector:
        device:
          integration: price_watch
    max_results:
      name: Max results
      description: >
        How many alternatives to return at most (1-20). Defaults to the
        per-product max_alternatives option, which is 5 if not configured.
      example: 5
      selector:
        number:
          mode: box
          min: 1
          max: 20
          step: 1

add_listing:
  name: Add listing
  description: >
    Add a new retailer listing to an existing tracked product. The product
    will start polling the new URL on the next coordinator tick. New
    per-listing sensors are created automatically.
  fields:
    entry_id:
      name: Config entry ID
      description: The product entry to add the listing to (required).
      example: 01KSBSNNAYACAF7FB34KX8BWNP
      selector:
        text:
    url:
      name: URL
      description: The listing's product URL (required).
      example: https://www.newegg.com/p/N82E16813145529
      selector:
        text:
    retailer:
      name: Retailer
      description: >
        Display name for the retailer. Used in the entity name
        (e.g. "Newegg Price"). Defaults to a name derived from the URL host.
      example: Newegg
      selector:
        text:
    currency:
      name: Currency
      description: >
        ISO currency code (USD, EUR, etc.). Optional — usually auto-detected
        from JSON-LD on the page.
      example: USD
      selector:
        text:
    custom_parser:
      name: Custom parser (JSON)
      description: >
        Optional custom parser config (JSON). Most retailers work via the
        default JSON-LD extractor; only needed for sites that require
        regex or JSON-path extraction.
      selector:
        object:
    request_cookies:
      name: Request cookies
      description: >
        Optional cookies for Cloudflare/anti-bot bypass. Accepts a
        Cookie-header string ("a=1; b=2"), a {name: value} mapping, or a
        list of cookie dicts {name, value, domain?, path?}. Stored inside
        the listing's custom_parser (the only place the extractor reads
        cookies) and kept independent of any price selectors.
      selector:
        object:

remove_listing:
  name: Remove listing
  description: >
    Remove a retailer listing from a tracked product. The listing's
    sensors and price history are deleted. Refuses to remove the primary
    listing — delete the whole product entry for that.
  fields:
    entry_id:
      name: Config entry ID
      description: The product entry the listing belongs to (required).
      example: 01KSBSNNAYACAF7FB34KX8BWNP
      selector:
        text:
    listing_id:
      name: Listing ID
      description: >
        The listing's stable ID (required, e.g. 'l_newegg_test'). Find
        it in the listing_id attribute of any per-listing sensor.
      example: l_newegg_test
      selector:
        text:

edit_listing:
  name: Edit listing
  description: >
    Update an existing listing's custom parser or metadata in place. Use
    this to attach a hand-tuned CSS price selector (e.g. captured via the
    panel's Advanced editor / bookmarklet) to a listing the default
    extractor can't read. Reloads the product so the next poll uses it.
    Unlike remove_listing, this is allowed on the primary listing.
  fields:
    entry_id:
      name: Config entry ID
      description: The product entry the listing belongs to (required).
      example: 01KSBSNNAYACAF7FB34KX8BWNP
      selector:
        text:
    listing_id:
      name: Listing ID
      description: >
        The listing's stable ID (required). Find it in the listing_id
        attribute of any per-listing sensor.
      example: l_newegg_test
      selector:
        text:
    custom_parser:
      name: Custom parser (JSON)
      description: >
        Parser config (JSON). An empty value CLEARS the parser, reverting
        the listing to the default JSON-LD + AI pipeline.
      selector:
        object:
    variant_options:
      name: Variant options
      description: >
        Pin a specific product-variant combo on sites that embed every
        variant's price in the page (Wix stores like athom.tech). Give the
        option labels exactly as shown on the page, e.g. "1xIR Remote, 5-48V"
        (comma-separated) or a YAML list. The tracker then follows THAT
        combo's price instead of the page's default offer. Empty value
        reverts to the default.
      example: 1xIR Remote, 5-48V
      selector:
        text:
    currency:
      name: Currency
      description: ISO currency code override (USD, EUR, ISK, …). Optional.
      example: ISK
      selector:
        text:
    retailer:
      name: Retailer
      description: Display-name override for the retailer. Optional.
      example: Tölvutek
      selector:
        text:
    request_cookies:
      name: Request cookies
      description: >
        Optional cookies for Cloudflare/anti-bot bypass. Accepts a
        Cookie-header string ("a=1; b=2"), a {name: value} mapping, or a
        list of cookie dicts {name, value, domain?, path?}. Stored inside
        the listing's custom_parser (the only place the extractor reads
        cookies) and kept independent of any price selectors.
      selector:
        object:

track_product:
  name: Track product
  description: >
    Create a new tracked product from a URL in one step (no extraction
    preview). Used by the panel's live-search "Track" dialog. The product
    starts polling on the next coordinator tick.
  fields:
    url:
      name: URL
      description: The product's listing URL (required).
      example: https://www.newegg.com/p/N82E16813145529
      selector:
        text:
    name:
      name: Name
      description: Display name for the product. Defaults to the URL.
      example: GIGABYTE Z890 motherboard
      selector:
        text:
    target_price:
      name: Target price
      description: Optional target price (in the product's currency).
      example: 4500
      selector:
        number:
          mode: box
          min: 0
          step: 0.01
