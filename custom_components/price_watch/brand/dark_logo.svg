<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>Price Watch (dark mode)</title>
  <!-- Dark mode logo: slate outer disc, dark navy inner with white PW, currency symbols use a darker shade for contrast against slate -->
  <circle cx="128" cy="128" r="124" fill="#94a3b8"/>
  <circle cx="128" cy="128" r="60" fill="#1e293b"/>
  <text x="128" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="600" fill="white" text-anchor="middle">PW</text>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#0f172a" text-anchor="middle">
    <text x="128" y="36">$</text>
    <text x="193" y="65">€</text>
    <text x="220" y="135">£</text>
    <text x="193" y="206">¥</text>
    <text x="128" y="234">kr</text>
    <text x="63" y="206">₹</text>
    <text x="36" y="135">฿</text>
    <text x="63" y="65">₽</text>
  </g>
</svg>
